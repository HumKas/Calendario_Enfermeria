<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda Enfermería</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f9;
            padding:40px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
        }

        button{
            width:100%;
            padding:12px;
            background:#3498db;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        table{
            width:100%;
            margin-top:30px;
            border-collapse:collapse;
        }

        th, td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

        th{
            background:#3498db;
            color:white;
        }

        .error{
            color:red;
            margin-bottom:15px;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Agenda Enfermería</h1>

    <form method="POST">

        {% csrf_token %}

        {% if form.errors %}
            <div class="error">
                {{ form.errors }}
            </div>
        {% endif %}

        {{ form.as_p }}

        <button type="submit">
            Agendar cita
        </button>

    </form>

    <h2>Citas Registradas</h2>

    <table>

        <tr>
            <th>Nombre</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Motivo</th>
        </tr>

        {% for cita in citas %}

        <tr>
            <td>{{ cita.nombre }}</td>
            <td>{{ cita.fecha }}</td>
            <td>{{ cita.hora }}</td>
            <td>{{ cita.motivo }}</td>
        </tr>

        {% empty %}

        <tr>
            <td colspan="4">
                No hay citas registradas
            </td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
