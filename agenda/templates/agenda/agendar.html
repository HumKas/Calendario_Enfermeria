<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda Enfermería</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f9;
            padding:40px;
        }

        .container{
            width:400px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
        }

        button{
            width:100%;
            padding:10px;
            background:#3498db;
            color:white;
            border:none;
            border-radius:5px;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Agenda Enfermería</h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Agendar cita
        </button>

    </form>

</div>

</body>
</html>
